# SonarQube Project Configuration — RunReady SG
sonar.projectKey=runready-sg
sonar.projectName=RunReady SG
sonar.projectVersion=1.0

# Source directories
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests

# Python backend settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# TypeScript/JavaScript frontend settings
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions (don't analyze these)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/*.min.js,\
  **/migrations/**,\
  frontend/coverage/**,\
  backend/coverage.xml

# Test file patterns
sonar.test.inclusions=backend/tests/**/*.py

# Encoding
sonar.sourceEncoding=UTF-8
