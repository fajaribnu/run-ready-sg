# Nginx config for EC2 production deployment
# Serves as reverse proxy: routes /api/* to FastAPI, everything else to React static files

server {
    listen 80;
    server_name _;

    # React frontend (served from S3/CloudFront in production,
    # but this config works for a single-VM setup too)
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8000;
    }
}
