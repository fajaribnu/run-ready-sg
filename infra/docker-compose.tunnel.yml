version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      network: host
    container_name: runready-backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
