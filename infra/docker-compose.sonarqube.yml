version: "3.8"

services:
  sonarqube:
    image: sonarqube:community
    container_name: runready-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy

  sonar-db:
    image: postgres:15
    container_name: runready-sonar-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      retries: 5

  # SonarScanner — runs analysis and uploads to SonarQube
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: runready-sonar-scanner
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_LOGIN: ${SONAR_TOKEN:-}
    volumes:
      - ../:/usr/src
    working_dir: /usr/src
    depends_on:
      - sonarqube
    # Run manually: docker compose -f docker-compose.sonarqube.yml run sonar-scanner
    profiles:
      - scan

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_pgdata: