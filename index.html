<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RunReady Shelters + Route</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            background: #f4f7f6;
            text-align: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        button {
            padding: 14px;
            width: 100%;
            border-radius: 40px;
            border: none;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        #map {
            height: 400px;
            margin-top: 20px;
            border-radius: 12px;
        }

        .shelter {
            background: #f8f9fa;
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
        }

        .shelter:hover {
            background: #e9ecef;
        }

        .loader {
            margin-top: 10px;
            color: #007bff;
            display: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏃‍♂️ RunReady SG</h2>
    <p>Find shelters & navigate to them</p>

    <button onclick="findShelters()">Find Nearby Shelters</button>
    <div class="loader" id="loading">📍 Getting location...</div>

    <div id="results"></div>

    <div id="map"></div>
</div>

<script>
const API_BASE = "http://localhost:8000";

let map;
let userMarker;
let routeLayer;

// Init map
function initMap(lat, lng) {
    if (map) map.remove();

    map = L.map('map').setView([lat, lng], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    userMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup("You are here")
        .openPopup();
}

// Draw route
function drawRoute(geometry) {
    if (routeLayer) {
        map.removeLayer(routeLayer);
    }

    const coords = geometry.coordinates.map(c => [c[1], c[0]]);

    routeLayer = L.polyline(coords, {
        weight: 5
    }).addTo(map);

    map.fitBounds(routeLayer.getBounds());
}

// Add shelter marker
function addShelterMarker(lat, lng, name) {
    L.marker([lat, lng]).addTo(map)
        .bindPopup(name);
}

// Fetch shelters
async function findShelters() {
    document.getElementById("loading").style.display = "block";

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        initMap(lat, lng);

        const res = await fetch(`${API_BASE}/api/nearby-shelters?lat=${lat}&lng=${lng}`);
        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        data.data.items.forEach(shelter => {
            const div = document.createElement("div");
            div.className = "shelter";

            div.innerHTML = `
                <strong>${shelter.name}</strong><br/>
                Distance: ${shelter.distance_m} m
            `;

            // CLICK → GET ROUTE
            div.onclick = () => getRoute(lat, lng, shelter);

            resultsDiv.appendChild(div);

            // add marker
            addShelterMarker(shelter.lat, shelter.lon, shelter.name);
        });

    }, () => {
        alert("Location permission required!");
    });
}

// Fetch route
async function getRoute(userLat, userLng, shelter) {

    const url = `${API_BASE}/api/route-to-shelter?user_lat=${userLat}&user_lng=${userLng}&shelter_lat=${shelter.lat}&shelter_lng=${shelter.lon}&shelter_name=${encodeURIComponent(shelter.name)}`;

    const res = await fetch(url);
    const data = await res.json();

    drawRoute(data.data.route.geometry);
}

</script>

</body>
</html>
